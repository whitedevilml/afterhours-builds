name: taskboard CI

on:
  push:
    paths:
      - "projects/taskboard/**"
      - ".github/workflows/taskboard-ci.yml"
  pull_request:
    paths:
      - "projects/taskboard/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/taskboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: projects/taskboard/package-lock.json
      - run: npm ci
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: projects/taskboard
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t taskboard:ci .
