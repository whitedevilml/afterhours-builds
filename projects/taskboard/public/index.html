<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taskboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="head">
      <h1>Taskboard</h1>
      <p class="sub">Demo full-stack app — API + UI + persistence</p>
    </header>
    <form id="add-form" class="row" autocomplete="off">
      <label class="sr" for="title">New task</label>
      <input id="title" name="title" type="text" placeholder="Add a task…" maxlength="500" required />
      <button type="submit" class="btn">Add</button>
    </form>
    <ul id="list" class="list" aria-live="polite"></ul>
    <p id="err" class="err" hidden></p>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
